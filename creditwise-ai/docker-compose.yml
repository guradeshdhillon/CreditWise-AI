version: "3.9"

services:
  api:
    build: .
    container_name: creditwise-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./saved_models:/app/saved_models   # persist model updates without rebuild
      - ./mlruns:/app/mlruns               # persist experiment logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: python:3.11-slim
    container_name: creditwise-mlflow
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5001:5001"
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow ui --host 0.0.0.0 --port 5001 --backend-store-uri /app/mlruns"
    restart: unless-stopped
